<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign up | ELYUNA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-aura"></div>
  <div class="bg-grid"></div>

  <nav>
    <a class="brand" href="index.html"><span class="dot"></span> <span><span class="b1">ELYU</span><span class="b2">NA</span></span></a>
    <div class="nav-links">
      <a href="index.html">Tourist Spots</a>
      <a href="hotels.html">Hotels</a>
      <a href="index.html#intro">History</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <form class="auth-card" id="signupForm">
      <h1>Create your account</h1>
      <p class="sub">Sign up to save spots, plan tours and book hotels.</p>
      <div class="auth-err" id="err"></div>
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="La Union" required />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ilovelaunion@gmail.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required />
      </div>
      <ul class="pw-reqs" id="pwReqs">
        <li data-rule="len"><span class="tick"></span> At least 8 characters</li>
        <li data-rule="upper"><span class="tick"></span> One uppercase letter</li>
        <li data-rule="lower"><span class="tick"></span> One lowercase letter</li>
        <li data-rule="num"><span class="tick"></span> One number</li>
      </ul>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Re-type your password" required />
        <div class="match-hint" id="matchHint"></div>
      </div>
      <button type="submit" class="btn btn-red btn-block">Sign up</button>
      <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
    </form>
  </div>

  <script src="js/app.js"></script>
  <script>
    const form = document.getElementById("signupForm");
    const err = document.getElementById("err");
    const pwInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirm");
    const matchHint = document.getElementById("matchHint");
    const reqs = document.getElementById("pwReqs");

    // Show whether the confirm field matches as the user types.
    function updateMatch() {
      if (!confirmInput.value) { matchHint.textContent = ""; matchHint.className = "match-hint"; return; }
      if (confirmInput.value === pwInput.value) {
        matchHint.textContent = "Passwords match";
        matchHint.className = "match-hint ok";
      } else {
        matchHint.textContent = "Passwords do not match yet";
        matchHint.className = "match-hint bad";
      }
    }
    confirmInput.addEventListener("input", updateMatch);

    // The same rules the server checks. Returns which ones currently pass.
    function checkPassword(pw) {
      return {
        len: pw.length >= 8,
        upper: /[A-Z]/.test(pw),
        lower: /[a-z]/.test(pw),
        num: /[0-9]/.test(pw)
      };
    }

    // Update the little checklist live as the user types.
    pwInput.addEventListener("input", function () {
      const result = checkPassword(pwInput.value);
      reqs.querySelectorAll("li").forEach(function (li) {
        const ok = result[li.dataset.rule];
        li.classList.toggle("met", ok);
        li.querySelector(".tick").innerHTML = ok ? ICONS.check : "";
      });
      updateMatch();
    });

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      err.classList.remove("show");
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = pwInput.value;
      const confirm = confirmInput.value;

      // Don't even send it if the password doesn't meet the rules yet.
      const result = checkPassword(password);
      if (!result.len || !result.upper || !result.lower || !result.num) {
        err.textContent = "Please meet all the password requirements below.";
        err.classList.add("show");
        return;
      }
      if (password !== confirm) {
        err.textContent = "The passwords do not match.";
        err.classList.add("show");
        return;
      }
      const res = await api("api/signup.php", "POST", { name: name, email: email, password: password, confirm: confirm });
      if (!res.ok) {
        err.textContent = res.data.error || "Could not sign up.";
        err.classList.add("show");
        return;
      }
      window.location.href = "trips.html";
    });
  </script>
</body>
</html>
